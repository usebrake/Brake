# Scanning is change-gated: the watcher diffs cheap frames a few times per
# second and runs detection when the screen changes. This value caps the
# detection cadence during sustained change (video playback); bursts, page
# loads, and scroll stops are scanned immediately regardless.
scan_interval_seconds: 3

lockout_duration_seconds: 600  # fallback only — actual duration comes from State.lockout_duration_minutes

nudity:
  enabled: true
  # Balanced policy is label-specific in brake.detectors.nudity.
  # This value is kept for backward-compatible config loading.
  confidence_threshold: 0.35
  trigger_classes:
    - FEMALE_BREAST_EXPOSED
    - FEMALE_GENITALIA_EXPOSED
    - MALE_GENITALIA_EXPOSED
    - BUTTOCKS_EXPOSED
    - ANUS_EXPOSED

logging:
  level: INFO
  max_bytes: 1048576
  backup_count: 3

hardening:
  block_taskmgr: true
  block_appwiz: true
  block_timedate: true
  # 500ms halves the timer wakeup rate vs 250ms; blocked windows still close
  # within half a second.
  poll_interval_ms: 500
